<!-- Advanced Settings Toggle -->
<div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; cursor: pointer;"
    onclick="toggleLoanAdvance()">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span style="font-weight: 700; color: #374151;">Advanced Settings</span>
        <span id="loanAdvToggleIcon" style="transition: transform 0.3s; display: inline-block;">▼</span>
    </div>
</div>

<!-- Advanced Settings Container -->
<div id="loanAdvanceContainer" style="display: none; margin-top: 15px;">

    <!-- Prepayment Penalty -->
    <div style="margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <label style="font-size: 0.9rem; color: #4b5563; font-weight: 600;">Prepayment Charges</label>
            <label class="switch">
                <input type="checkbox" id="loanTogglePenalty" onchange="toggleLoanAdvanceInput('loanPenaltyGroup')">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="loanPenaltyGroup" style="display: none;">
            <div class="sip-control-group">
                <div class="sip-label-row">
                    <label>Penalty Rate</label>
                    <div class="sip-amount-wrapper">
                        <input type="number" id="loanInputPenalty" class="sip-number-input" value="0.5" step="0.1">
                        <span class="unit-symbol">%</span>
                    </div>
                </div>
                <input type="range" id="loanRangePenalty" min="0.1" max="4" step="0.1" value="0.5" class="sip-range">
            </div>
        </div>
    </div>

    <!-- Step Up Surplus -->
    <div style="margin-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <label style="font-size: 0.9rem; color: #4b5563; font-weight: 600;">Step Up Surplus</label>
            <label class="switch">
                <input type="checkbox" id="loanToggleStepUp" onchange="toggleLoanAdvanceInput('loanStepUpGroup')">
                <span class="slider round"></span>
            </label>
        </div>
        <div id="loanStepUpGroup" style="display: none;">
            <div class="sip-control-group">
                <div class="sip-label-row">
                    <label>Step Up Rate (Annually)</label>
                    <div class="sip-amount-wrapper">
                        <input type="number" id="loanInputStepUp" class="sip-number-input" value="10" step="1">
                        <span class="unit-symbol">%</span>
                    </div>
                </div>
                <input type="range" id="loanRangeStepUp" min="1" max="50" step="1" value="10" class="sip-range">
            </div>
        </div>
    </div>

</div>
